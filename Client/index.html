<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="../images/logo.png">
    <title>VNB</title>
</head>
<body>
    <div class="main">
        <header>
            <div class="logo"> 
                <img src="../images/logo.png" alt="logo">
            </div> 
            <div class="search"></div> 
                <form>
                    <input type="text" id="search" placeholder="Nhập để tìm kiếm">
                    <button>nigg</button> 
                </form> 
            <div class="user-avatar-container">
                <div class="user">
                    <img class="avatar" src="../images/user.png">  
                    <span>Tài khoản</span>  
            </div>
                <div class="user-item user-cart">
                    <div class="cart-icon-wrapper">
                        <img class="avatar" src="../images/shopping-cart.png" alt="Giỏ hàng">
                        <span class="cart-count">0</span> 
                    </div>
                    <span>Giỏ hàng</span>
                </div>
            </div>
        </header> 
        <nav>
            <img id="menu-icon" src="../images/menu.png">
            <ul class="menu" id="menu">
                <li><a href="">Trang chủ</a></li>
                <li><a href="">Sản Phẩm <span class="arrow"></span></a>
                    <ul class="sub-menu">
                            <li><a href="">Vợt Cầu lông</a></li>
                            <li><a href="">Áo Cầu Lông</a></li>
                            <li><a href="">Quần Cầu Lông</a></li>
                            <li><a href="">Giày Cầu Lông</a></li>
                            <li><a href="">Phụ Kiện</a></li>
                    </ul>
                </li>
                <li><a href="">Sale Off</a></li>
                <li><a href="">Hướng dẫn <span class="arrow"></span></a>
                    <ul class="sub-menu">
                            <li><a href="">Hướng Dẫn Thanh Toán</a></li>
                            <li><a href="">Hướng Dẫn Mua Hàng</a></li>
                    </ul>
                </li>
                <li><a href="">Liên hệ</a></li>
            </ul>
        </nav>

        <section>
            <div class="slider-container">
                <div class="slider" id="banner-slider">
                    <img class="slide" src="../images/Banner_1.webp" alt="Banner 1">
                    <img class="slide" src="../images/Banner_2.webp" alt="Banner 2">
                    <img class="slide" src="../images/Banner_3.webp" alt="Banner 3">
                </div>
                <button class="nav-btn prev-btn" onclick="moveSlide(-1)">&#10094;</button>
                <button class="nav-btn next-btn" onclick="moveSlide(1)">&#10095;</button>
            </div>
        </section>

    </div> <script>
        // JS cho Menu
        const btn = document.getElementById('menu-icon');
        const menu = document.getElementById('menu');

        btn.addEventListener('click',function(){
            menu.classList.toggle('show');
        });

        // JS cho Banner
        let currentIndex = 0;
        const slider = document.getElementById('banner-slider');
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        function moveSlide(direction) {
            currentIndex += direction;
            
            if (currentIndex < 0) {
                currentIndex = totalSlides - 1;
            } else if (currentIndex >= totalSlides) {
                currentIndex = 0;
            }
            
            updateSlider();
        }

        function updateSlider() {
            const newTransformValue = -(currentIndex * 100) + '%';
            slider.style.transform = `translateX(${newTransformValue})`;
        }

        let autoSlide = setInterval(() => {
            moveSlide(1);
        }, 4000);

        const sliderContainer = document.querySelector('.slider-container');
        sliderContainer.addEventListener('mouseenter', () => {
            clearInterval(autoSlide);
        });

        sliderContainer.addEventListener('mouseleave', () => {
            autoSlide = setInterval(() => {
                moveSlide(1);
            }, 4000);
        });
    </script>
</body>
</html>
