<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <title>VNB</title>
</head>
<body>
    <div class="main">
        <header>
            <div class="logo"> 
                <img src="images/logo.png" alt="logo">
            </div> 
            <div class="search"></div> 
                <form>
                    <input
                        type="text"
                        id="search"
                        placeholder="Nhập để tìm kiếm"
                    >    
                </form> 
            <div class="user">
                <span>Thinh Thai</span>
                <img class="avatar" src="image/avatar.jpg">
            </div>    
        </header> 
        <nav>
            <img id="menu-icon" src="image/menu.jpeg">
            <ul class="menu" id="menu">
                <li><a href="">Trang chủ</a></li>
                <li><a href="">Giới thiệu</a></li>
                <li><a href="">Sản phẩm</a>
                    <ul class="sub-menu">
                        <li><a href="#laptop">Máy tính</a></li>
                        <li><a href="#mobile">Điện thoại</a></li>
                        <li><a href="">Huấn lện</a></li>
                        <li><a href="">Đào tạo</a></li>
                    </ul>
                </li>
                <li><a href="">Liên hệ</a></li>
            </ul>
        </nav>
        <script>
            const btn = document.getElementById('menu-icon')
            const menu = document.getElementById('menu')

            btn.addEventListener('click',function(){
                menu.classList.toggle('show')
            })
        </script>
        <section>
            <div class="content">
            <img class="background" src="image/logo.jpg" />
        </section>
    </div>
</head>
</body>
</html>
