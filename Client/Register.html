<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Đăng Kí - VNB</title>
</head>
<body class="LoginAndRegister-body">

    <div class="LoginAndRegister-card">
        <h2>Đăng Kí</h2>
        <div class="underline-decor"></div>
        
        <form>
            <div class="input-group">
                <input type="text" placeholder="Tên Hiển Thị" required>
            </div>
            <div class="input-group">
                <input type="text" placeholder="Email/Số ĐT" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Mật khẩu" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Nhập Lại Mật khẩu" required>
            </div>
            <button type="submit" class="btn-login">Đăng Kí</button>
        </form>

        <div class="Aternative_Login">
            <p class="Log_through">Hoặc đăng nhập qua</p>
            <div class="AL_Button">
                <button>
                    <img src="../images/Google-logo.png" alt="Google"> Google
                </button>
                <button>
                    <img src="../images/Facebook-logo-48.png" alt="Facebook"> Facebook
                </button>
            </div>
        </div>

        <div class="TrangChu_DangKi_DangNhap">
            <a href="index.html" class="back-home">← Quay lại trang chủ</a>
            <span class="register-text">Bạn đã có tài khoản? <a href="taikhoan.html" class="register-link">Đăng nhập</a></span>
        </div>
    </div>

</body>
</html>
